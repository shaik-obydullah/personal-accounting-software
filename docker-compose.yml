services:
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: accounting_php
    working_dir: /var/www/symfony
    volumes:
      - ./symfony:/var/www/symfony
    environment:
      APP_ENV: dev
      DATABASE_URL: mysql://accounting_user:accounting_pass@mysql:3306/accounting_db
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: accounting_nginx
    ports:
      - "8040:80"
    volumes:
      - ./symfony:/var/www/symfony
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  mysql:
    image: mariadb:10.11
    container_name: accounting_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: accounting_db
      MYSQL_USER: accounting_user
      MYSQL_PASSWORD: accounting_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: accounting_pma
    ports:
      - "8041:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
    depends_on:
      - mysql

volumes:
  mysql_data:
